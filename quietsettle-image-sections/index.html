<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuietSettle Interface References</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --zama: #abe338;
      --ink: #050505;
      --paper: #f8f8f2;
      --grey: #d9d9d9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--ink);
      color: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px clamp(16px, 4vw, 48px);
      background: rgba(5, 5, 5, .86);
      border-bottom: 1px solid rgba(255, 255, 255, .12);
      backdrop-filter: blur(14px);
    }
    a { color: inherit; }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-weight: 720;
    }
    .brand img { width: 28px; height: 28px; border-radius: 7px; }
    .back {
      color: var(--ink);
      background: var(--zama);
      border-radius: 999px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 720;
    }
    main {
      width: min(1240px, 100%);
      margin: 0 auto;
      padding: 34px clamp(14px, 3vw, 28px) 64px;
      display: grid;
      gap: 26px;
    }
    figure {
      margin: 0;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      border-radius: 8px;
      overflow: hidden;
    }
    figcaption {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      color: var(--grey);
      border-bottom: 1px solid rgba(255,255,255,.1);
      font-size: 14px;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      background: #111;
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="../index.html"><img src="../logo.svg" alt="" />QuietSettle</a>
    <a class="back" href="../index.html#contract">Open dApp</a>
  </header>
  <main>
    <figure>
      <figcaption><strong>01 Product Command Hero</strong><span>Escrow console first viewport</span></figcaption>
      <img src="./section-01-product-command-hero.png" alt="QuietSettle product command hero interface" />
    </figure>
    <figure>
      <figcaption><strong>02 Deal Registry</strong><span>Searchable confidential escrow deals</span></figcaption>
      <img src="./section-02-deal-registry.png" alt="QuietSettle deal registry interface" />
    </figure>
    <figure>
      <figcaption><strong>03 Deal Workspace</strong><span>Selected buyer vendor verifier context</span></figcaption>
      <img src="./section-03-deal-workspace.png" alt="QuietSettle deal workspace interface" />
    </figure>
    <figure>
      <figcaption><strong>04 Create Deal Flow</strong><span>Relayer encryption and createDeal</span></figcaption>
      <img src="./section-04-create-deal-flow.png" alt="QuietSettle create deal flow interface" />
    </figure>
    <figure>
      <figcaption><strong>05 Fund And Approve Flow</strong><span>Deposit, buyer approval, verifier approval</span></figcaption>
      <img src="./section-05-fund-approve-flow.png" alt="QuietSettle fund and approve flow interface" />
    </figure>
    <figure>
      <figcaption><strong>06 Release Refund Flow</strong><span>Payout guard and settlement accounting</span></figcaption>
      <img src="./section-06-release-refund-flow.png" alt="QuietSettle release and refund flow interface" />
    </figure>
    <figure>
      <figcaption><strong>07 Confidential Decryption</strong><span>EIP-712 user decryption path</span></figcaption>
      <img src="./section-07-confidential-decryption.png" alt="QuietSettle confidential amount decryption interface" />
    </figure>
    <figure>
      <figcaption><strong>08 Developer Reference CTA</strong><span>Zama FHEVM integration surface</span></figcaption>
      <img src="./section-08-developer-reference-cta.png" alt="QuietSettle developer reference interface" />
    </figure>
  </main>
</body>
</html>
